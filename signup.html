<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp Page</title>
        <link rel="stylesheet" href="mdbootstrap/css/mdb.min.css">
        <style>
            .hidden{
                display: none;
            }
        </style>
</head>
<body>

    <div class="container">

        <h1 class="text-center my-5">Signup Page</h1>

        <form id="signupForm">
            <!-- 2 column grid layout with text inputs for the first and last names -->
            <div class="row mb-4">
              <div class="col">
                <div data-mdb-input-init class="form-outline">
                  <input type="text" id="firstName" class="form-control" />
                  <label class="form-label" for="firstName">First name</label>
                </div>
              </div>
              <div class="col">
                <div data-mdb-input-init class="form-outline">
                  <input type="text" id="lastName" class="form-control" />
                  <label class="form-label" for="lastName">Last name</label>
                </div>
              </div>
            </div>
          
            <!-- Email input -->
            <div data-mdb-input-init class="form-outline mb-4">
              <input type="email" id="email" class="form-control" />
              <label class="form-label" for="email">Email address</label>
            </div>
          
            <!-- Password input -->
            <div data-mdb-input-init class="form-outline mb-4">
              <input type="password" id="password" class="form-control" />
              <label class="form-label" for="password">Password</label>
            </div>

            <div class="row mb-4">
                <div class="col">
                  <div data-mdb-input-init class="form-outline">
                    <input type="text" id="city" class="form-control" />
                    <label class="form-label" for="city">City</label>
                  </div>
                </div>
                <div class="col">
                  <div data-mdb-input-init class="form-outline">
                    <input type="text" id="country" class="form-control" />
                    <label class="form-label" for="country">Country</label>
                  </div>
                </div>
              </div>

            <div data-mdb-input-init class="form-outline mb-4">
              <input type="text" id="address" class="form-control" />
              <label class="form-label" for="address">Address</label>
            </div>
          

            <button type="button" id="signupBtn" class="btn btn-primary btn-block mb-4">Sign up</button>
          
    
          </form>

          <div class="alert alert-success alert-dismissible fade show hidden" id="alertMessage" role="alert">
            <strong>Holy guacamole!</strong> You should check in on some of those fields below.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
    </div>



    
     <script src="mdbootstrap/js/mdb.umd.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="script.js"></script>
</body>
</html>
